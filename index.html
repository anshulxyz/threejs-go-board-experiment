<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js + Bun</title>
    <style>
        body { margin: 0; background-color: #111; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        #status-text {
            font-size: 1.5rem;
            margin-top: 10px;
        }

        .button {
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #dbb06d;
            color: #111;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto; /* Enable clicking */
            font-family: sans-serif;
            transition: background-color 0.2s;
        }

        .button:hover {
            background-color: #c49a5b;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Three.js Go Board</h1>
        <p>A 19x19 interactive Go board!</p>
        <div id="status-text">I love Go</div>
        <button id="rotate-btn" class="button">Rotate 90°</button>
        <button id="reset-btn" class="button">Reset View</button>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
