<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js + Bun</title>
    <style>
        body { margin: 0; background-color: #111; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        #butterfly-text {
            position: absolute;
            color: #dbb06d;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(219, 176, 109, 0.6);
            pointer-events: none;
            white-space: nowrap;
            z-index: 5;
            font-family: 'Times New Roman', serif; /* A bit more classic for Go */
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Three.js Go Board</h1>
        <p>A 19x19 interactive Go board!</p>
    </div>
    <div id="butterfly-text">I love Go</div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
